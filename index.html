<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XYZW 游戏管理系统</title>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "SF Pro Display",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          "PingFang SC",
          "Hiragino Sans GB",
          "Microsoft YaHei",
          "Helvetica Neue",
          Helvetica,
          Arial,
          sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
      }

      #app {
        min-height: 100vh;
      }

      .loading {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: white;
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="loading">正在加载应用...</div>
    </div>
    <!-- APK NativeHttp 检测脚本 -->
    <script>
      // 检测是否为 Capacitor APK 环境
      window.__isCapacitorApp = typeof window.Capacitor !== 'undefined' && window.Capacitor.isNativePlatform();
      
      if (window.__isCapacitorApp) {
        console.log('[APK环境检测] 这是一个 Capacitor APK');
        
        // 等待 XyzwNativeHttp 接口注册，最多等待10秒
        let waitCount = 0;
        const maxWait = 100;
        
        function checkNativeHttp() {
          waitCount++;
          if (typeof window.XyzwNativeHttp !== 'undefined') {
            console.log('[APK环境检测] XyzwNativeHttp 接口已就绪 (等待了' + waitCount + '次)');
            window.__nativeHttpReady = true;
          } else if (waitCount < maxWait) {
            setTimeout(checkNativeHttp, 100);
          } else {
            console.error('[APK环境检测] XyzwNativeHttp 接口未注册！APK版本可能过旧，请重新安装。');
          }
        }
        
        checkNativeHttp();
      } else {
        console.log('[APK环境检测] 浏览器开发环境');
      }
    </script>
    <script type="module" src="/src/main.js"></script>
    <script type="module" src="/src/xyzw/cocos2d-js-min.js"></script>
    <script type="module" src="/src/xyzw/game-defines.js"></script>
    <script type="module" src="/src/xyzw/index.js"></script>
  </body>
</html>
