name: Build Desktop

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Create portable zip
        shell: powershell
        run: |
          $releaseDir = "src-tauri/target/release"
          $portableDir = "$releaseDir/xyzw-web-helper-portable"
          New-Item -ItemType Directory -Force -Path $portableDir
          # 查找实际生成的 exe 文件（可能包含版本号）
          $exeFile = Get-ChildItem "$releaseDir/*.exe" | Where-Object { $_.Name -like "*.exe" -and $_.Name -notlike "*setup*" } | Select-Object -First 1
          if ($exeFile) {
            Copy-Item $exeFile.FullName "$portableDir/xyzw-web-helper.exe"
            Write-Host "Copied: $($exeFile.Name)"
          } else {
            Write-Error "No exe file found in $releaseDir"
            exit 1
          }
          # 复制 DLL 文件
          Copy-Item "$releaseDir/*.dll" $portableDir/ -ErrorAction SilentlyContinue
          # 创建 zip
          Compress-Archive -Path "$portableDir/*" -DestinationPath "$releaseDir/xyzw-web-helper-portable.zip" -Force

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: xyzw-web-helper-windows
          path: |
            src-tauri/target/release/xyzw-web-helper-portable.zip
            src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 7

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            src-tauri/target/release/xyzw-web-helper-portable.zip
            src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
